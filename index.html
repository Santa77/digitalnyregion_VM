<!DOCTYPE html>

<head>

  <!-- Primary SEO -->

  <meta name="keywords" content="digitálny región, hlasovanie, monitoring, projekty, kraje, Slovakia, voting, knižnica">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Slavoj SANTA Hruska">
  <link rel="canonical" href="https://vyvoj.rsnet.sk/~santa/kniznica/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vyvoj.rsnet.sk/~santa/kniznica/">
  <meta property="og:site_name" content="Voting Monitor – Digitálny región">
  <meta property="og:title" content="Voting Monitor – Digitálny región Slovakia">
  <meta property="og:description" content="Sledujte v reálnom čase hlasovanie v súťaži Digitálny región. Aktuálne poradie projektov, trendy prírastkov hlasov a historický vývoj pre všetky kraje Slovenska.">
  <meta property="og:locale" content="sk_SK">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Voting Monitor – Digitálny región Slovakia">
  <meta name="twitter:description" content="Sledujte v reálnom čase hlasovanie v súťaži Digitálny región. Aktuálne poradie projektov, trendy prírastkov hlasov a historický vývoj pre všetky kraje Slovenska.">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Voting Monitor – Digitálny región",
    "url": "https://vyvoj.rsnet.sk/~santa/kniznica/",
    "description": "Monitorovacia aplikácia pre hlasovanie v súťaži Digitálny región. Zobrazuje aktuálne poradie projektov, trendy prírastkov hlasov a historický vývoj hlasov v čase.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "inLanguage": "sk",
    "author": {
      "@type": "Person",
      "name": "Santa"
    },
    "about": {
      "@type": "Event",
      "name": "Digitálny región – súťaž projektov",
      "url": "https://www.digitalnyregion.sk",
      "location": {
        "@type": "Country",
        "name": "Slovensko"
      }
    }
  }
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-bar-chart-fill me-2"></i>Voting Monitor
    </span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-light small" id="last-update">
        <i class="bi bi-clock me-1"></i>Načítavam…
      </span>
      <div class="dropdown">
        <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" id="regionDropdown"
                data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-geo-alt me-1"></i><span id="region-label">Všetky regióny</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" id="region-menu" aria-labelledby="regionDropdown">
          <li><a class="dropdown-item active" href="#" data-region="">Všetky regióny</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid py-4">

  <!-- Stats row -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-value" id="stat-projects">—</div>
        <div class="stat-label">Projektov</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-value" id="stat-votes">—</div>
        <div class="stat-label">Hlasov celkom</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-value" id="stat-leader">—</div>
        <div class="stat-label">Líder</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-value" id="stat-regions">—</div>
        <div class="stat-label">Regiónov</div>
      </div>
    </div>
  </div>

  <!-- Project cards -->
  <div class="row g-3 mb-4" id="cards-grid"></div>

  <!-- Trend chart -->
  <div class="chart-section mb-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h6 class="mb-0 fw-semibold">
        <i class="bi bi-rocket-takeoff me-2 text-accent"></i>Trendy – prírastky hlasov
      </h6>
      <div class="btn-group btn-group-sm" role="group" id="trend-filter">
        <button type="button" class="btn btn-outline-secondary active" data-window="10">10 meraní</button>
        <button type="button" class="btn btn-outline-secondary" data-window="50">50 meraní</button>
        <button type="button" class="btn btn-outline-secondary" data-window="100">100 meraní</button>
      </div>
    </div>
    <div class="chart-container chart-container--trend">
      <canvas id="trend-chart"></canvas>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-section">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h6 class="mb-0 fw-semibold">
        <i class="bi bi-graph-up me-2 text-accent"></i>Vývoj hlasov
      </h6>
      <div class="btn-group btn-group-sm" role="group" id="hours-filter">
        <button type="button" class="btn btn-outline-secondary" data-hours="6">6h</button>
        <button type="button" class="btn btn-outline-secondary active" data-hours="0">Všetko</button>
        <button type="button" class="btn btn-outline-secondary" data-hours="24">24h</button>
        <button type="button" class="btn btn-outline-secondary" data-hours="72">3d</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="votes-chart"></canvas>
    </div>
  </div>

</div>

<div id="error-toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
