  {
    "@context": "https://schema.org",
    "@type": "WebApplication",

  <!-- Inline theme init – must run before CSS to prevent FOUC -->
  <script>
    (function(){
      var t;
      try { t = localStorage.getItem('vmTheme'); } catch(e){}
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.svg" sizes="any">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="site-header">
  <div class="hdr-brand">
    <div class="hdr-live"><span class="live-dot"></span>LIVE</div>
    <div class="hdr-title">VOTING<br>MONITOR</div>
  </div>

  <div class="hdr-meta">
    <div id="last-update" class="hdr-ts">—</div>
    <div class="hdr-sub">DIGITÁLNY REGIÓN · SLOVENSKO · AUTO-REFRESH 5 MIN</div>
  </div>

  <div class="hdr-controls">
    <button class="theme-btn" id="theme-toggle" aria-label="Prepnúť režim">
      <!-- icon injected by app.js -->
    </button>
    <div class="region-wrap" id="region-wrap">
      <button class="region-btn" id="regionDropdown" aria-haspopup="listbox" aria-expanded="false">
        <span id="region-label">VŠETKY REGIÓNY</span>
        <svg class="chevron-icon" viewBox="0 0 10 6" fill="none" aria-hidden="true">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <ul class="region-menu" id="region-menu" role="listbox">
        <li><a class="dropdown-item active" href="#" data-region="">VŠETKY REGIÓNY</a></li>
      </ul>
    </div>
  </div>
</header>

<!-- ── Stats strip ────────────────────────────────────── -->
<div class="stats-strip">
  <div class="stat-cell">
    <div class="stat-value" id="stat-projects">—</div>
    <div class="stat-label">PROJEKTOV</div>
  </div>
  <div class="stat-cell">
    <div class="stat-value" id="stat-votes">—</div>
    <div class="stat-label">HLASOV CELKOM</div>
  </div>
  <div class="stat-cell stat-cell--wide">
    <div class="stat-value stat-value--leader" id="stat-leader">—</div>
    <div class="stat-label">LÍDER</div>
  </div>
  <div class="stat-cell">
    <div class="stat-value" id="stat-regions">—</div>
    <div class="stat-label">REGIÓNOV</div>
  </div>
</div>

<!-- ── Main ───────────────────────────────────────────── -->
<main class="main-content">

  <!-- Project cards -->
  <section class="panel" id="cards-panel">
    <div class="panel-hdr panel-hdr--toggle" id="cards-panel-hdr">
      <span class="panel-title">≡ PORADIE PROJEKTOV</span>
      <button class="collapse-btn" id="cards-collapse-btn" aria-expanded="true" aria-controls="cards-grid">
        <svg class="collapse-icon" viewBox="0 0 10 6" fill="none" aria-hidden="true">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </section>

  <!-- Trend chart -->
  <section class="panel">
    <div class="panel-hdr">
      <span class="panel-title">↑ TRENDY — PRÍRASTKY HLASOV</span>
      <div class="seg-btns" id="trend-filter">
        <button class="active" data-window="10">10 MERANÍ</button>
        <button data-window="50">50 MERANÍ</button>
        <button data-window="100">100 MERANÍ</button>
      </div>
    </div>
    <div class="chart-container chart-container--trend">
      <canvas id="trend-chart"></canvas>
    </div>
  </section>

  <!-- Line chart -->
  <section class="panel">
    <div class="panel-hdr">
      <span class="panel-title">~ HISTORICKÝ VÝVOJ HLASOV</span>
      <div class="seg-btns" id="hours-filter">
        <button data-hours="6">6H</button>
        <button class="active" data-hours="0">VŠETKO</button>
        <button data-hours="24">24H</button>
        <button data-hours="72">3D</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="votes-chart"></canvas>
    </div>
  </section>

</main>

<div id="error-toast-container" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
