<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Voting Monitor logo">
  <!-- Background -->
  <rect width="512" height="512" fill="#070707"/>

  <!-- Ascending vote bars -->
  <rect x="106" y="295" width="90" height="65"  fill="#c8881e" opacity="0.45" rx="5"/>
  <rect x="211" y="210" width="90" height="150" fill="#c8881e" opacity="0.72" rx="5"/>
  <rect x="316" y="125" width="90" height="235" fill="#c8881e"               rx="5"/>

  <!-- Baseline -->
  <rect x="90" y="367" width="332" height="2" fill="#c8881e" opacity="0.28"/>

  <!-- VM monogram -->
  <text
    x="256" y="460"
    font-family="'Arial Black', 'Arial Bold', Impact, sans-serif"
    font-size="90" font-weight="900"
    fill="#d8d3c8"
    text-anchor="middle"
    letter-spacing="4">VM</text>

  <!-- Sub-label – only visible at larger sizes -->
  <text
    x="256" y="496"
    font-family="'Courier New', Courier, monospace"
    font-size="22" font-weight="400"
    fill="#c8881e" opacity="0.55"
    text-anchor="middle"
    letter-spacing="6">VOTING MONITOR</text>
</svg>
