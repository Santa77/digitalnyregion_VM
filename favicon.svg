<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Voting Monitor">
  <!-- Background -->
  <rect width="32" height="32" fill="#070707"/>

  <!-- 3 ascending bars -->
  <rect x="4"  y="19" width="6" height="5"  fill="#c8881e" opacity="0.50" rx="1"/>
  <rect x="13" y="14" width="6" height="10" fill="#c8881e" opacity="0.75" rx="1"/>
  <rect x="22" y="8"  width="6" height="16" fill="#c8881e"               rx="1"/>

  <!-- Baseline -->
  <rect x="3" y="25" width="26" height="1" fill="#c8881e" opacity="0.30"/>
</svg>
